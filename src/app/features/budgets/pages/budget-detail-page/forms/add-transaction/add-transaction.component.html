<form (ngSubmit)="submit()" [formGroup]="form">
  <div class="w-full flex gap-4">
    <app-input
      class="w-1/2"
      label="Monto total de la transacción"
      placeholder="1000"
      type="number"
      formControlName="amount"
    ></app-input>
    <app-error-form-message
      [control]="form.controls['amount']"
    ></app-error-form-message>

    <div class="w-full flex flex-col">
      <app-date-selector
        class="w-full"
        label="Fecha"
        formControlName="transactionDate"
      ></app-date-selector>
      <app-error-form-message
        [control]="form.controls['transactionDate']"
      ></app-error-form-message>
    </div>
  </div>

  <div class="w-full my-4">
    <app-input
      label="Descripción"
      placeholder="¿Qué transacción es esta?"
      type="text"
      formControlName="description"
    ></app-input>
    <app-error-form-message
      [control]="form.controls['description']"
    ></app-error-form-message>
  </div>
  <div class="w-full mb-4 flex gap-4">
    <div class="w-full flex flex-col">
      <app-select
        label="Banco"
        class="w-full"
        [options]="banksOptions()"
        formControlName="bankId"
      ></app-select>
      <app-error-form-message
        [control]="form.controls['bankId']"
      ></app-error-form-message>
    </div>

    <div class="w-full flex flex-col">
      <app-select
        label="Tipo de transacción"
        class="w-full"
        [options]="transactionTypesOptions()"
        formControlName="transactionTypeId"
      ></app-select>
      <app-error-form-message
        [control]="form.controls['transactionTypeId']"
      ></app-error-form-message>
    </div>
  </div>

  <app-wrapper>
    <div class="w-full" formArrayName="assignments">
      <div class="flex justify-between items-center">
        <app-text weight="semibold" color="terciary" variant="xl"
          >Asignaciones</app-text
        >
      </div>

      <div class="flex flex-col max-h-96 overflow-y-auto pr-2">
        @for (assignment of assignments.controls; track $index) {
          <app-transaction-assignment
            [formGroup]="asFormGroup(assignment)"
            (remove)="removeAssignment($index)"
          ></app-transaction-assignment>
        }
        <div class="w-full flex justify-center py-5">
          <app-button-text
            label="Agregar asignación"
            size="small"
            icon="plus"
            (onClick)="addAssignment()"
          ></app-button-text>
        </div>
        <app-error-form-message
          [control]="form.controls['assignments']"
        ></app-error-form-message>
      </div>
    </div>
  </app-wrapper>

  <div class="w-full flex justify-end mt-5">
    <app-button
      [disabled]="form.invalid"
      label="Agregar transacción"
    ></app-button>
  </div>
</form>
